<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>critterview · kubagachi sprite preview</title>
  <style>
    :root {
      --bg: #07090d;
      --panel: #11161d;
      --panel-2: #161c25;
      --border: #1f2630;
      --border-strong: #2b3442;
      --text: #d3dbe6;
      --muted: #6b7785;
      --accent: #7dd3fc;

      --running: #4ade80;
      --pending: #fbbf24;
      --completed: #34d399;
      --crashloop: #f87171;
      --backoff: #fb923c;
      --terminating: #9ca3af;
      --unknown: #d1d5db;
      --error: #f43f5e;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at 20% -10%, rgba(125,211,252,0.05), transparent 50%),
        radial-gradient(circle at 80% 110%, rgba(244,63,94,0.04), transparent 40%),
        var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      min-height: 100vh;
    }
    img { image-rendering: pixelated; image-rendering: crisp-edges; }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
      background: rgba(7,9,13,0.85);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px 22px;
    }
    .brand {
      font-size: 15px;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .brand .dot { color: var(--accent); }
    .brand .pill {
      font-size: 10px;
      color: var(--muted);
      border: 1px solid var(--border-strong);
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
    }
    .meta code { color: var(--text); background: var(--panel); padding: 1px 6px; border-radius: 4px; }

    .controls { margin-left: auto; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .controls label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .controls input[type=range] { accent-color: var(--accent); width: 120px; }
    .controls .val { color: var(--text); font-size: 12px; min-width: 36px; text-align: right; letter-spacing: 0; text-transform: none; }
    .controls input[type=text] {
      background: var(--panel);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      width: 140px;
    }
    .controls button {
      background: var(--panel);
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .controls button.on { border-color: var(--accent); color: var(--accent); }
    .controls button:hover { border-color: var(--accent); }

    .state-toggles { display: inline-flex; gap: 4px; flex-wrap: wrap; }
    .state-toggles button {
      padding: 3px 8px;
      font-size: 10px;
    }
    .state-toggles button[data-state=running]     { border-color: rgba(74,222,128,0.35);  color: var(--running); }
    .state-toggles button[data-state=pending]     { border-color: rgba(251,191,36,0.35);  color: var(--pending); }
    .state-toggles button[data-state=completed]   { border-color: rgba(52,211,153,0.35);  color: var(--completed); }
    .state-toggles button[data-state=crashloop]   { border-color: rgba(248,113,113,0.45); color: var(--crashloop); }
    .state-toggles button[data-state=backoff]     { border-color: rgba(251,146,60,0.35);  color: var(--backoff); }
    .state-toggles button[data-state=terminating] { border-color: rgba(156,163,175,0.35); color: var(--terminating); }
    .state-toggles button[data-state=unknown]     { border-color: rgba(209,213,219,0.25); color: var(--unknown); }
    .state-toggles button[data-state=error]       { border-color: rgba(244,63,94,0.45);   color: var(--error); }
    .state-toggles button.off { opacity: 0.25; }

    .view-tabs { display: inline-flex; gap: 4px; }
    .view-tabs button.on { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    main { padding: 18px 20px 60px; }

    /* ── grid view ───────────────────────────────────────────────── */
    .grid { display: grid; gap: 18px; }
    .critter-card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px 16px;
    }
    .critter-card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .critter-card h3 .mascot { color: var(--muted); font-size: 11px; font-weight: normal; letter-spacing: 1px; text-transform: uppercase; }
    .critter-card h3 .badges { margin-left: auto; display: inline-flex; gap: 4px; }
    .badge {
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      border: 1px solid var(--border-strong);
      color: var(--muted);
      padding: 1px 6px;
      border-radius: 3px;
    }
    .badge.live { border-color: rgba(74,222,128,0.4); color: var(--running); }

    .keyed-strip {
      display: block;
      width: 100%;
      max-height: 96px;
      object-fit: contain;
      object-position: left center;
      margin-bottom: 10px;
      background: repeating-conic-gradient(#11151c 0% 25%, #131820 0% 50%) 50%/12px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .anim-row { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 8px; }
    .anim-cell {
      background: repeating-conic-gradient(#0d1219 0% 25%, #11171f 0% 50%) 50%/10px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 6px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: border-color 200ms;
    }
    .anim-cell .label {
      font-size: 9px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .anim-cell.has-anim[data-state=running]     { border-color: rgba(74,222,128,0.35); }
    .anim-cell.has-anim[data-state=pending]     { border-color: rgba(251,191,36,0.35); }
    .anim-cell.has-anim[data-state=completed]   { border-color: rgba(52,211,153,0.35); }
    .anim-cell.has-anim[data-state=crashloop]   { border-color: rgba(248,113,113,0.45); }
    .anim-cell.has-anim[data-state=backoff]     { border-color: rgba(251,146,60,0.35); }
    .anim-cell.has-anim[data-state=terminating] { border-color: rgba(156,163,175,0.35); }
    .anim-cell.has-anim[data-state=unknown]     { border-color: rgba(209,213,219,0.25); }
    .anim-cell.has-anim[data-state=error]       { border-color: rgba(244,63,94,0.45); }
    .anim-cell .label[data-state=running]     { color: var(--running); }
    .anim-cell .label[data-state=pending]     { color: var(--pending); }
    .anim-cell .label[data-state=completed]   { color: var(--completed); }
    .anim-cell .label[data-state=crashloop]   { color: var(--crashloop); }
    .anim-cell .label[data-state=backoff]     { color: var(--backoff); }
    .anim-cell .label[data-state=terminating] { color: var(--terminating); }
    .anim-cell .label[data-state=unknown]     { color: var(--unknown); }
    .anim-cell .label[data-state=error]       { color: var(--error); }

    .frame {
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
    }
    .frame img { display: block; will-change: transform; }
    .frame.missing {
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 10px;
      border: 1px dashed var(--border-strong);
      border-radius: 4px;
    }

    /* ── compare view ────────────────────────────────────────────── */
    .compare {
      display: grid;
      gap: 12px;
    }
    .compare-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: center;
    }
    .compare-row .row-label {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: right;
    }
    .compare-row .cells {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
    }
    .compare-cell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .compare-cell .name {
      font-size: 10px;
      color: var(--muted);
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── latest view ─────────────────────────────────────────────── */
    .latest {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }
    .latest-item {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .latest-item .head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }
    .latest-item .head .title {
      font-size: 13px;
      letter-spacing: 0.3px;
    }
    .latest-item .head .title .state {
      color: var(--text);
    }
    .latest-item .head .title .critter {
      color: var(--muted);
      font-size: 11px;
      margin-right: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .latest-item .head .ts {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .latest-item .filmstrip {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 14px;
      background: transparent;
      padding: 4px 0;
    }
    .latest-item .filmstrip .filmframe {
      position: relative;
      aspect-ratio: 1 / 1;
      background:
        repeating-conic-gradient(#0d1219 0% 25%, #11171f 0% 50%) 50%/8px 8px;
      border: 2px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition:
        border-color 120ms ease,
        transform 120ms ease,
        box-shadow 120ms ease;
    }
    .latest-item .filmstrip .filmframe.current {
      border-color: var(--accent);
      box-shadow:
        0 0 0 3px rgba(125, 211, 252, 0.18),
        0 6px 18px rgba(125, 211, 252, 0.25);
      transform: scale(1.10);
      z-index: 2;
    }
    .latest-item .filmstrip .filmframe img {
      max-width: 88%;
      max-height: 88%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .latest-item .filmstrip .filmframe .idx {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.3px;
      background: rgba(0,0,0,0.5);
      padding: 0 4px;
      border-radius: 3px;
      line-height: 14px;
    }
    .latest-item .filmstrip .filmframe.current .idx {
      color: var(--bg);
      background: var(--accent);
    }
    .latest-item .player-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .latest-item .player {
      width: 240px;
      height: 240px;
      background: repeating-conic-gradient(#0d1219 0% 25%, #11171f 0% 50%) 50%/10px 10px;
      border: 2px solid var(--accent);
      border-radius: 10px;
      box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex: 0 0 240px;
    }
    /* swap pulse — a brief brightness/scale flash when a new frame appears */
    .latest-item .player img.frame-enter {
      animation: framepop 160ms ease-out;
    }
    @keyframes framepop {
      0%   { transform: translate(-50%, -50%) scale(0.97); filter: brightness(1.5); }
      100% { transform: translate(-50%, -50%) scale(1);    filter: brightness(1); }
    }
    .latest-item .player img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      position: absolute;
    }
    .latest-item .meta-row {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
    }
    .latest-item .meta-row code {
      color: var(--text);
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ── gallery view ────────────────────────────────────────────── */
    .gallery {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .gallery-section {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px 16px;
    }
    .gallery-section h3 {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .gallery-section h3 .count { color: var(--muted); font-size: 11px; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .gallery-item {
      background: repeating-conic-gradient(#0d1219 0% 25%, #11171f 0% 50%) 50%/10px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
      text-decoration: none;
      color: inherit;
      transition: border-color 200ms, transform 100ms;
    }
    .gallery-item:hover { border-color: var(--accent); transform: translateY(-1px); }
    .gallery-item .meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .gallery-item .meta .kind {
      color: var(--text);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border-strong);
    }
    .gallery-item .filename {
      font-size: 11px;
      color: var(--text);
      word-break: break-all;
    }
    .gallery-item .img-wrap {
      background: #0a0e14;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      max-height: 240px;
      overflow: hidden;
    }
    .gallery-item .img-wrap img {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }
    .empty code { color: var(--text); }

    footer {
      padding: 24px 20px;
      color: var(--muted);
      font-size: 11px;
      border-top: 1px solid var(--border);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <header>
    <span class="brand">critter<span class="dot">·</span>view <span class="pill" id="countPill">…</span></span>
    <span class="meta" id="meta">scanning critters/…</span>

    <div class="controls">
      <div class="view-tabs">
        <button data-view="latest" class="on">Latest</button>
        <button data-view="grid">Per critter</button>
        <button data-view="compare">Compare by state</button>
        <button data-view="gallery">Gallery</button>
      </div>

      <label>fps <input type="range" id="fps" min="1" max="24" step="1" value="8"><span class="val" id="fpsVal">8</span></label>
      <label>scale <input type="range" id="scale" min="64" max="240" step="8" value="144"><span class="val" id="scaleVal">144</span></label>
      <label>filter <input type="text" id="filter" placeholder="claude, postgres…" autocomplete="off"></label>
      <button id="chromaBtn" class="on">Chroma-key magenta</button>
      <button id="pauseBtn">Pause</button>
    </div>
  </header>

  <div class="state-toggles" style="padding: 10px 20px 0;">
    <span class="meta" style="margin-right:6px;">states:</span>
    <!-- buttons rendered by JS -->
    <span id="stateToggles"></span>
  </div>

  <main>
    <div id="content"></div>
  </main>

  <footer>
    sprite sheets are 8-frame horizontal flip-books generated by <code style="color:var(--text)">spriteanim</code>;
    keyed strips are produced by <code style="color:var(--text)">critterforge sheet</code>.
    use the state toggles to focus, drag fps to slow it down.
  </footer>

  <script>
    const $ = sel => document.querySelector(sel);

    let DATA = { states: [], critters: [] };
    let LATEST = { items: [] };
    let view = "latest";
    let latestRefreshHandle = null;
    let fps = 8;
    let scale = 144;
    let filter = "";
    let paused = false;
    let chromaKey = true;
    let enabledStates = new Set();
    const players = []; // { tick, img, frames }

    // Cache: src URL -> Promise<HTMLImageElement | HTMLCanvasElement>
    // Canvas variant is returned for sheets that need magenta -> alpha cleanup.
    const imageCache = new Map();

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = e => reject(e);
        img.src = src;
      });
    }

    // sampleCornerColor picks the most-common color from the corners and
    // edges of the image. If that color is highly saturated OR fills a
    // dominant share of the corner samples, treat it as a chroma-key bg.
    function sampleCornerColor(pixels, w, h) {
      const samples = [];
      const probes = [
        [0, 0], [w - 1, 0], [0, h - 1], [w - 1, h - 1],
        [w >> 1, 0], [w >> 1, h - 1], [0, h >> 1], [w - 1, h >> 1],
      ];
      const counts = new Map();
      for (const [x, y] of probes) {
        const i = (y * w + x) * 4;
        const r = pixels[i], g = pixels[i + 1], b = pixels[i + 2], a = pixels[i + 3];
        if (a < 16) continue; // already transparent
        // Bucket by /16 to tolerate jpeg-style noise
        const key = `${r >> 4},${g >> 4},${b >> 4}`;
        const entry = counts.get(key) || { r, g, b, n: 0 };
        entry.n++;
        counts.set(key, entry);
        samples.push([r, g, b, a]);
      }
      if (counts.size === 0) return null;
      let best = null;
      for (const v of counts.values()) {
        if (!best || v.n > best.n) best = v;
      }
      // Require the dominant edge color to occupy at least half the probes
      // — otherwise the sprite probably bleeds to the edge and we'd damage it.
      if (best.n < Math.ceil(probes.length / 2)) return null;
      return best;
    }

    function isLikelyChromaKey(rgb) {
      const { r, g, b } = rgb;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      const chroma = max - min;
      // Reject near-grays / near-whites / near-blacks. Real chroma-key
      // colors are saturated, mid-bright.
      if (chroma < 70) return false;
      if (max < 100) return false;
      return true;
    }

    function chromaKeyImage(img) {
      const c = document.createElement("canvas");
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      const ctx = c.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, c.width, c.height);
      const px = data.data;

      const bg = sampleCornerColor(px, c.width, c.height);
      if (!bg || !isLikelyChromaKey(bg)) {
        // Nothing safe to remove — return original drawn canvas.
        return c;
      }

      // Replace pixels within Euclidean distance ≤ 80 of the bg with alpha 0.
      const br = bg.r, bgGr = bg.g, bb = bg.b;
      const tolSq = 80 * 80;
      for (let i = 0; i < px.length; i += 4) {
        const dr = px[i] - br, dg = px[i + 1] - bgGr, db = px[i + 2] - bb;
        if (dr * dr + dg * dg + db * db <= tolSq) {
          px[i + 3] = 0;
        }
      }
      ctx.putImageData(data, 0, 0);
      return c;
    }

    async function loadSheet(url, declaredHasAlpha) {
      // Returns an HTMLCanvasElement (or HTMLImageElement when chroma-key is
      // off and the source already has alpha). The chroma-key function itself
      // bails out when it can't find a confident chroma-key color, so it's
      // safe to apply even when the file claims to have alpha — some sheets
      // have a fake-alpha green/magenta background.
      const key = (chromaKey ? "K:" : "R:") + url;
      if (imageCache.has(key)) return imageCache.get(key);
      const promise = (async () => {
        const img = await loadImage(url);
        if (chromaKey) {
          return chromaKeyImage(img);
        }
        return img;
      })();
      imageCache.set(key, promise);
      return promise;
    }

    // sliceFrames returns N canvases — one per frame.
    // Bounds come from the server (`/api/critters` and `/api/latest` embed
    // `bounds: [{x0,y0,x1,y1}, ...]`). If bounds aren't supplied (or the
    // count is wrong), fall back to fixed-grid slicing.
    const frameCache = new Map();
    async function sliceFrames(url, declaredHasAlpha, frames, serverBounds) {
      const boundsHash = serverBounds
        ? serverBounds.map(b => `${b.x0},${b.x1}`).join("|")
        : "grid";
      const key = (chromaKey ? "K:" : "R:") + frames + ":" + boundsHash + ":" + url;
      if (frameCache.has(key)) return frameCache.get(key);
      const promise = (async () => {
        const src = await loadSheet(url, declaredHasAlpha);
        const naturalW = src instanceof HTMLCanvasElement ? src.width : src.naturalWidth;
        const naturalH = src instanceof HTMLCanvasElement ? src.height : src.naturalHeight;

        const bounds = (serverBounds && serverBounds.length === frames)
          ? serverBounds
          : fixedGridBounds(naturalW, naturalH, frames);

        // Normalize vertical to the union extent so frames line up.
        let yMin = Infinity, yMax = -Infinity;
        for (const b of bounds) {
          if (b.y0 < yMin) yMin = b.y0;
          if (b.y1 > yMax) yMax = b.y1;
        }
        if (yMin === Infinity) { yMin = 0; yMax = naturalH; }
        const pad = 4;
        yMin = Math.max(0, yMin - pad);
        yMax = Math.min(naturalH, yMax + pad);
        const cropH = yMax - yMin;

        // Normalize horizontal to the widest detected frame so the player
        // doesn't visibly resize between frame swaps.
        let cropW = 0;
        for (const b of bounds) {
          const w = b.x1 - b.x0;
          if (w > cropW) cropW = w;
        }
        cropW = Math.max(1, cropW + pad * 2);

        const out = [];
        for (const b of bounds) {
          const c = document.createElement("canvas");
          c.width = cropW;
          c.height = cropH;
          const ctx = c.getContext("2d");
          ctx.imageSmoothingEnabled = false;
          const srcW = b.x1 - b.x0;
          const dstX = Math.floor((cropW - srcW) / 2);
          ctx.drawImage(src,
            b.x0, yMin, srcW, cropH,
            dstX, 0, srcW, cropH);
          out.push(c);
        }
        return out;
      })();
      frameCache.set(key, promise);
      return promise;
    }

    function fixedGridBounds(w, h, n) {
      const out = [];
      const step = Math.floor(w / n);
      for (let i = 0; i < n; i++) {
        out.push({ x0: i * step, x1: (i + 1) * step, y0: 0, y1: h });
      }
      return out;
    }

    function unionBoundingBox(canvases) {
      let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
      let any = false;
      for (const c of canvases) {
        const bb = opaqueBoundingBox(c);
        if (!bb) continue;
        any = true;
        if (bb.x0 < x0) x0 = bb.x0;
        if (bb.y0 < y0) y0 = bb.y0;
        if (bb.x1 > x1) x1 = bb.x1;
        if (bb.y1 > y1) y1 = bb.y1;
      }
      return any ? { x0, y0, x1, y1 } : null;
    }

    function opaqueBoundingBox(canvas) {
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const w = canvas.width, h = canvas.height;
      const data = ctx.getImageData(0, 0, w, h).data;
      let x0 = w, y0 = h, x1 = -1, y1 = -1;
      // Threshold 12 to ignore stray faint pixels from chroma-key bleed.
      const alphaMin = 12;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          if (data[(y * w + x) * 4 + 3] > alphaMin) {
            if (x < x0) x0 = x;
            if (y < y0) y0 = y;
            if (x > x1) x1 = x;
            if (y > y1) y1 = y;
          }
        }
      }
      if (x1 < 0) return null;
      return { x0, y0, x1: x1 + 1, y1: y1 + 1 };
    }

    function startTicker() {
      let last = performance.now();
      function loop(now) {
        if (!paused) {
          const dt = now - last;
          const interval = 1000 / fps;
          if (dt >= interval) {
            last = now - (dt % interval);
            for (const p of players) p.tick();
          }
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    }

    function makePlayer(cell, anim) {
      // Slice the sheet into 8 frame canvases at load time. Render all 8
      // stacked in the same cell; tick swaps which one is `display: block`.
      // This is a true frame-by-frame swap — no translate, no clipping.
      const frame = document.createElement("div");
      frame.className = "frame";
      frame.style.width = scale + "px";
      frame.style.height = scale + "px";
      frame.style.alignItems = "center";
      frame.style.justifyContent = "center";
      frame.style.position = "relative";
      cell.appendChild(frame);

      let i = Math.floor(Math.random() * anim.frames);
      const p = {
        frames: anim.frames,
        nodes: [],
        tick() {
          if (!p.nodes.length) return;
          const prev = i;
          i = (i + 1) % p.frames;
          if (p.nodes[prev]) p.nodes[prev].style.display = "none";
          p.nodes[i].style.display = "block";
        },
      };
      players.push(p);

      sliceFrames(anim.url, anim.has_alpha, anim.frames, anim.bounds).then(frameCanvases => {
        // Each frame canvas is the natural per-frame pixel dimensions.
        // Display each at object-fit:contain semantics into the cell.
        const frameW = frameCanvases[0].width;
        const frameH = frameCanvases[0].height;
        const fit = Math.min(scale / frameW, scale / frameH);
        const displayW = Math.max(1, Math.round(frameW * fit));
        const displayH = Math.max(1, Math.round(frameH * fit));

        frameCanvases.forEach((c, idx) => {
          // Clone via toDataURL into a fresh <img>; doing so keeps the
          // crisp-edges rendering hint working and gives one DOM node per
          // frame that we can show/hide independently.
          const img = new Image();
          img.src = c.toDataURL("image/png");
          img.style.width = displayW + "px";
          img.style.height = displayH + "px";
          img.style.imageRendering = "pixelated";
          img.style.position = "absolute";
          img.style.display = idx === i ? "block" : "none";
          img.draggable = false;
          frame.appendChild(img);
          p.nodes[idx] = img;
        });
      }).catch(() => {
        frame.style.background = "rgba(244,63,94,0.1)";
      });

      return p;
    }

    function cloneCanvasToImg(canvas) {
      // Inline canvases hold pixels; we clone via toDataURL so each cell
      // gets its own DOM node we can transform independently. For chroma-keyed
      // sheets this also makes them work as <img> elements with crisp-edges.
      const img = new Image();
      img.src = canvas.toDataURL("image/png");
      return img;
    }

    function renderStillTile(cell, url, needsChromaKey) {
      const frame = document.createElement("div");
      frame.className = "frame";
      frame.style.width = scale + "px";
      frame.style.height = scale + "px";
      frame.style.alignItems = "center";
      frame.style.justifyContent = "center";
      cell.appendChild(frame);

      loadSheet(url, needsChromaKey).then(src => {
        const node = src instanceof HTMLCanvasElement
          ? cloneCanvasToImg(src)
          : src.cloneNode(true);
        node.style.maxWidth = scale + "px";
        node.style.maxHeight = scale + "px";
        node.style.objectFit = "contain";
        node.style.imageRendering = "pixelated";
        node.draggable = false;
        frame.appendChild(node);
      });
    }

    function makeMissing(cell, h) {
      const frame = document.createElement("div");
      frame.className = "frame missing";
      frame.style.width = h + "px";
      frame.style.height = h + "px";
      frame.textContent = "—";
      cell.appendChild(frame);
    }

    // Render a keyed sheet preview strip, applying chroma-key if needed.
    function renderKeyedStrip(parent, url, dim, hasAlpha) {
      const wrap = document.createElement("div");
      wrap.className = "keyed-strip";
      wrap.style.height = "auto";
      wrap.style.maxHeight = Math.max(96, scale * 0.9) + "px";
      wrap.style.position = "relative";
      wrap.style.display = "flex";
      wrap.style.alignItems = "center";
      wrap.style.justifyContent = "flex-start";
      wrap.style.overflow = "hidden";

      const placeholder = document.createElement("div");
      placeholder.style.height = Math.max(96, scale * 0.9) + "px";
      wrap.appendChild(placeholder);

      loadSheet(url, !hasAlpha).then(src => {
        wrap.innerHTML = "";
        const node = src instanceof HTMLCanvasElement
          ? cloneCanvasToImg(src)
          : src.cloneNode(true);
        node.style.maxWidth = "100%";
        node.style.height = "auto";
        node.style.maxHeight = Math.max(96, scale * 0.9) + "px";
        node.style.imageRendering = "pixelated";
        node.draggable = false;
        wrap.appendChild(node);
      });

      parent.appendChild(wrap);
    }

    function renderStateToggles() {
      const host = $("#stateToggles");
      host.innerHTML = "";
      for (const s of DATA.states) {
        const b = document.createElement("button");
        b.dataset.state = s;
        b.textContent = s;
        b.className = enabledStates.has(s) ? "" : "off";
        b.addEventListener("click", () => {
          if (enabledStates.has(s)) enabledStates.delete(s);
          else enabledStates.add(s);
          renderStateToggles();
          render();
        });
        host.appendChild(b);
      }
    }

    function matchesFilter(name) {
      if (!filter) return true;
      return name.toLowerCase().includes(filter.toLowerCase());
    }

    function clearPlayers() {
      players.length = 0;
    }

    function render() {
      clearPlayers();
      const host = $("#content");
      host.innerHTML = "";
      const critters = DATA.critters.filter(c => matchesFilter(c.name));
      $("#countPill").textContent = `${critters.length} / ${DATA.critters.length}`;

      if (critters.length === 0) {
        host.innerHTML = `<div class="empty">no critters matched <code>${filter || "*"}</code></div>`;
        return;
      }

      if (view === "latest") renderLatest(host);
      else if (view === "grid") renderGrid(host, critters);
      else if (view === "compare") renderCompare(host, critters);
      else renderGallery(host, critters);
    }

    async function fetchLatest() {
      try {
        const r = await fetch("/api/latest?limit=24", { cache: "no-cache" });
        if (!r.ok) throw new Error(r.statusText);
        LATEST = await r.json();
      } catch (e) {
        LATEST = { items: [], error: String(e) };
      }
    }

    function renderLatest(host) {
      // First paint: show whatever we have, then trigger a fetch and
      // re-render. After that, kick a periodic refresh while this view is
      // active.
      if (latestRefreshHandle) {
        clearInterval(latestRefreshHandle);
        latestRefreshHandle = null;
      }
      const wrap = document.createElement("div");
      wrap.className = "latest";
      host.appendChild(wrap);

      const initial = LATEST.items.length > 0;
      if (!initial) {
        wrap.innerHTML = `<div class="empty" style="grid-column: 1 / -1;">loading…</div>`;
      } else {
        paintLatest(wrap);
      }

      fetchLatest().then(() => {
        if (view !== "latest") return;
        wrap.innerHTML = "";
        paintLatest(wrap);
      });

      latestRefreshHandle = setInterval(async () => {
        if (view !== "latest") {
          clearInterval(latestRefreshHandle);
          latestRefreshHandle = null;
          return;
        }
        await fetchLatest();
        if (view !== "latest") return;
        // Only repaint if the freshest URL changed — avoids tearing the DOM
        // every tick while no new files have landed.
        const top = LATEST.items[0]?.url;
        if (top && wrap.dataset.top !== top) {
          wrap.dataset.top = top;
          clearPlayers();
          wrap.innerHTML = "";
          paintLatest(wrap);
        }
      }, 4000);
    }

    function paintLatest(wrap) {
      if (!LATEST.items || LATEST.items.length === 0) {
        wrap.innerHTML = `<div class="empty" style="grid-column: 1 / -1;">no files yet</div>`;
        return;
      }
      wrap.dataset.top = LATEST.items[0].url;
      for (const item of LATEST.items) {
        wrap.appendChild(renderLatestItem(item));
      }
    }

    function renderLatestItem(item) {
      const card = document.createElement("div");
      card.className = "latest-item";

      const label = item.kind === "anim"
        ? `<span class="critter">${item.critter}</span><span class="state">${item.state}</span>`
        : item.kind === "keyed"
          ? `<span class="critter">${item.critter}</span><span class="state">keyed</span>`
          : `<span class="critter">${item.critter}</span><span class="state">${item.state} (tile)</span>`;

      const head = document.createElement("div");
      head.className = "head";
      head.innerHTML = `
        <div class="title">${label}</div>
        <div class="ts">${formatRelative(item.mod_unix)}</div>
      `;
      card.appendChild(head);

      // Player + meta row
      const playerRow = document.createElement("div");
      playerRow.className = "player-row";

      const player = document.createElement("div");
      player.className = "player";
      playerRow.appendChild(player);

      const meta = document.createElement("div");
      meta.className = "meta-row";
      meta.innerHTML = `
        <div><code>${item.filename}</code></div>
        <div>${item.w}×${item.h}${item.frames ? ` · ${item.frames} frames` : ""}</div>
        <div>alpha=${item.has_alpha ? "yes" : "no"} · <a href="${item.url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">open raw ↗</a></div>
      `;
      playerRow.appendChild(meta);
      card.appendChild(playerRow);

      if (item.kind === "anim") {
        // Just the big player — discrete frame swap, no filmstrip.
        const anim = {
          url: item.url, w: item.w, h: item.h, frames: item.frames || 8,
          has_alpha: item.has_alpha,
          bounds: item.bounds,
        };
        attachLatestPlayer(player, null, [], anim);
      } else {
        // Keyed sheet or still tile: just a single preview, no animation.
        const img = document.createElement("img");
        img.src = item.url;
        img.alt = item.filename;
        player.appendChild(img);
        // For keyed, show the whole sheet inline below as well.
        if (item.kind === "keyed") {
          const wide = document.createElement("img");
          wide.src = item.url;
          wide.style.width = "100%";
          wide.style.maxHeight = "120px";
          wide.style.objectFit = "contain";
          wide.style.background = "repeating-conic-gradient(#0d1219 0% 25%, #11171f 0% 50%) 50%/10px 10px";
          wide.style.border = "1px solid var(--border)";
          wide.style.borderRadius = "6px";
          wide.style.imageRendering = "pixelated";
          card.appendChild(wide);
        }
      }

      return card;
    }

    function attachLatestPlayer(player, strip, slots, anim) {
      // Use the same pre-sliced canvas pipeline as the per-critter cells,
      // but additionally populate each filmstrip slot with the matching
      // sliced frame so the user can see all 8 phases side-by-side.
      let i = Math.floor(Math.random() * anim.frames);
      const nodes = [];
      const p = {
        frames: anim.frames,
        tick() {
          if (!nodes.length) return;
          const prev = i;
          i = (i + 1) % p.frames;
          if (nodes[prev]) nodes[prev].style.display = "none";
          const next = nodes[i];
          if (next) {
            next.style.display = "block";
            // Re-trigger the pop animation each frame swap.
            next.classList.remove("frame-enter");
            void next.offsetWidth; // force reflow
            next.classList.add("frame-enter");
          }
          if (slots[prev]) slots[prev].classList.remove("current");
          if (slots[i]) slots[i].classList.add("current");
        },
      };
      players.push(p);

      sliceFrames(anim.url, anim.has_alpha, anim.frames, anim.bounds).then(frameCanvases => {
        const frameW = frameCanvases[0].width;
        const frameH = frameCanvases[0].height;
        // Player size: contain into the player box (240x240)
        const playerScale = 240;
        const fit = Math.min(playerScale / frameW, playerScale / frameH);
        const displayW = Math.max(1, Math.round(frameW * fit));
        const displayH = Math.max(1, Math.round(frameH * fit));

        frameCanvases.forEach((c, idx) => {
          // Big player frames (animated swap)
          const dataURL = c.toDataURL("image/png");
          const big = new Image();
          big.src = dataURL;
          big.style.width = displayW + "px";
          big.style.height = displayH + "px";
          big.style.imageRendering = "pixelated";
          big.style.display = idx === i ? "block" : "none";
          big.style.position = "absolute";
          // Center inside the player box. translate(-50%) handles half-pixel
          // sub-positioning so sprites don't drift between swaps.
          big.style.top = "50%";
          big.style.left = "50%";
          big.style.transform = "translate(-50%, -50%)";
          big.draggable = false;
          player.appendChild(big);
          nodes[idx] = big;

          // Filmstrip frames (always visible)
          if (slots[idx]) {
            const sm = new Image();
            sm.src = dataURL;
            slots[idx].appendChild(sm);
            if (idx === i) slots[idx].classList.add("current");
          }
        });
      }).catch(() => {
        player.style.background = "rgba(244,63,94,0.1)";
      });
    }

    function formatRelative(unix) {
      if (!unix) return "";
      const now = Math.floor(Date.now() / 1000);
      const dt = now - unix;
      if (dt < 60) return dt + "s ago";
      if (dt < 3600) return Math.floor(dt / 60) + "m ago";
      if (dt < 86400) return Math.floor(dt / 3600) + "h ago";
      return Math.floor(dt / 86400) + "d ago";
    }

    function renderGallery(host, critters) {
      const wrap = document.createElement("div");
      wrap.className = "gallery";

      for (const c of critters) {
        const assets = collectCritterAssets(c);
        if (assets.length === 0) continue;
        const section = document.createElement("div");
        section.className = "gallery-section";
        section.innerHTML = `<h3>${c.name} <span class="count">${assets.length} file${assets.length === 1 ? "" : "s"}</span></h3>`;
        const grid = document.createElement("div");
        grid.className = "gallery-grid";

        for (const asset of assets) {
          const item = document.createElement("a");
          item.className = "gallery-item";
          item.href = asset.url;
          item.target = "_blank";
          item.rel = "noopener";

          item.innerHTML = `
            <div class="meta">
              <span class="kind">${asset.kind}</span>
              <span>${asset.dim || ""}</span>
            </div>
            <div class="img-wrap"><img loading="lazy" src="${asset.url}" alt="${asset.filename}"></div>
            <div class="filename">${asset.filename}</div>
          `;
          grid.appendChild(item);
        }
        section.appendChild(grid);
        wrap.appendChild(section);
      }

      if (!wrap.children.length) {
        host.innerHTML = `<div class="empty">no static assets discovered</div>`;
        return;
      }
      host.appendChild(wrap);
    }

    function collectCritterAssets(c) {
      const out = [];
      const filename = url => url.split("?")[0].split("/").pop();

      if (c.keyed_url) {
        out.push({
          kind: "keyed",
          url: c.keyed_url,
          filename: filename(c.keyed_url),
          dim: c.keyed_dim ? `${c.keyed_dim.w}×${c.keyed_dim.h}` : "",
        });
      }
      for (const s of DATA.states) {
        if (c.tiles?.[s]) {
          out.push({
            kind: "tile " + s,
            url: c.tiles[s],
            filename: filename(c.tiles[s]),
            dim: "",
          });
        }
      }
      for (const s of DATA.states) {
        if (c.anim?.[s]) {
          const a = c.anim[s];
          out.push({
            kind: "anim " + s,
            url: a.url,
            filename: filename(a.url),
            dim: `${a.w}×${a.h} · ${a.frames}f`,
          });
        }
      }
      return out;
    }

    function renderGrid(host, critters) {
      const wrap = document.createElement("div");
      wrap.className = "grid";
      for (const c of critters) {
        const card = document.createElement("div");
        card.className = "critter-card";

        const animCount = Object.keys(c.anim || {}).length;
        const tileCount = Object.keys(c.tiles || {}).length;
        const badges = [];
        if (c.keyed_url) badges.push(`<span class="badge">keyed</span>`);
        if (animCount) badges.push(`<span class="badge live">${animCount} anim</span>`);
        if (tileCount) badges.push(`<span class="badge">${tileCount} tile</span>`);

        card.innerHTML = `
          <h3>
            <span>${c.name}</span>
            <span class="mascot">${c.keyed_dim ? c.keyed_dim.w + "×" + c.keyed_dim.h : ""}</span>
            <span class="badges">${badges.join("")}</span>
          </h3>
        `;

        if (c.keyed_url) {
          renderKeyedStrip(card, c.keyed_url, c.keyed_dim, c.keyed_has_alpha);
        }

        const row = document.createElement("div");
        row.className = "anim-row";
        for (const s of DATA.states) {
          if (!enabledStates.has(s)) continue;
          const cell = document.createElement("div");
          cell.className = "anim-cell";
          cell.dataset.state = s;
          const label = document.createElement("span");
          label.className = "label";
          label.dataset.state = s;
          label.textContent = s;
          cell.appendChild(label);

          const anim = c.anim?.[s];
          if (anim) {
            cell.classList.add("has-anim");
            makePlayer(cell, anim);
          } else if (c.tiles?.[s]) {
            renderStillTile(cell, c.tiles[s], !c.keyed_has_alpha);
          } else {
            makeMissing(cell, scale);
          }

          row.appendChild(cell);
        }
        card.appendChild(row);
        wrap.appendChild(card);
      }
      host.appendChild(wrap);
    }

    function renderCompare(host, critters) {
      const wrap = document.createElement("div");
      wrap.className = "compare";
      for (const s of DATA.states) {
        if (!enabledStates.has(s)) continue;
        const row = document.createElement("div");
        row.className = "compare-row";
        row.innerHTML = `
          <div class="row-label" style="color: var(--${s}); border-left: 2px solid var(--${s}); padding-right: 12px;">${s}</div>
        `;
        const cells = document.createElement("div");
        cells.className = "cells";
        for (const c of critters) {
          const cell = document.createElement("div");
          cell.className = "compare-cell";
          const name = document.createElement("span");
          name.className = "name";
          name.textContent = c.name;
          cell.appendChild(name);
          const anim = c.anim?.[s];
          if (anim) {
            makePlayer(cell, anim);
          } else if (c.tiles?.[s]) {
            renderStillTile(cell, c.tiles[s], !c.keyed_has_alpha);
          } else {
            makeMissing(cell, scale);
          }
          cells.appendChild(cell);
        }
        row.appendChild(cells);
        wrap.appendChild(row);
      }
      host.appendChild(wrap);
    }

    function bindControls() {
      const fpsEl = $("#fps"), fpsVal = $("#fpsVal");
      fpsEl.addEventListener("input", () => {
        fps = +fpsEl.value;
        fpsVal.textContent = fps;
      });

      const scEl = $("#scale"), scVal = $("#scaleVal");
      scEl.addEventListener("input", () => {
        scale = +scEl.value;
        scVal.textContent = scale;
        render();
      });

      $("#filter").addEventListener("input", e => {
        filter = e.target.value.trim();
        render();
      });

      $("#pauseBtn").addEventListener("click", () => {
        paused = !paused;
        const b = $("#pauseBtn");
        b.textContent = paused ? "Resume" : "Pause";
        b.classList.toggle("on", paused);
      });

      $("#chromaBtn").addEventListener("click", () => {
        chromaKey = !chromaKey;
        $("#chromaBtn").classList.toggle("on", chromaKey);
        imageCache.clear();
        render();
      });

      document.querySelectorAll(".view-tabs button").forEach(b => {
        b.addEventListener("click", () => {
          view = b.dataset.view;
          document.querySelectorAll(".view-tabs button").forEach(x => x.classList.toggle("on", x === b));
          render();
        });
      });
    }

    async function main() {
      bindControls();
      let data;
      try {
        const r = await fetch("/api/critters", { cache: "no-cache" });
        if (!r.ok) throw new Error(r.statusText);
        data = await r.json();
      } catch (e) {
        $("#content").innerHTML = `<div class="empty">failed to load <code>/api/critters</code><br><br>${e}</div>`;
        return;
      }
      DATA = data;
      enabledStates = new Set(DATA.states);
      $("#meta").innerHTML =
        `${DATA.critters.length} critter${DATA.critters.length === 1 ? "" : "s"} on disk · ${DATA.states.length} states`;
      renderStateToggles();
      render();
      startTicker();
    }

    main();
  </script>
</body>
</html>
