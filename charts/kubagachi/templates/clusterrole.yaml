{{- if and .Values.rbac.create (eq .Values.mode "in-cluster") -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubagachi.fullname" . }}
  labels:
    {{- include "kubagachi.labels" . | nindent 4 }}
rules:
  {{- if .Values.rbac.clusterRead }}
  # Cluster-wide read: the informers stream every resource kind (pods, nodes,
  # events) plus the Flux toolkit CRDs discovered via the dynamic client.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  {{- end }}
  {{- if .Values.rbac.podExec }}
  # The interactive in-pod terminal POSTs to pods/exec (and pods/attach).
  - apiGroups: [""]
    resources: ["pods/exec", "pods/attach"]
    verbs: ["create", "get"]
  {{- end }}
{{- end }}
