{{- if and .Values.rbac.create (eq .Values.mode "in-cluster") -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubagachi.fullname" . }}
  labels:
    {{- include "kubagachi.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubagachi.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubagachi.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
