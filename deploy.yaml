# kubagachi — Kubernetes cockpit (pods as pixel-art critters).
# Dev deploy: live-cluster mode driven by the KUBECONFIG_DATA secret (the
# entrypoint materializes it to a kubeconfig). Until that secret is set the
# container serves --demo, so the route is live immediately.
#
#   idpctl render --env dev --root ~/idp -f deploy.yaml --image ghcr.io/jakenesler/kubagachi:<sha7>
app: kubagachi

runtime:
  image: ghcr.io/jakenesler/kubagachi   # tag supplied by `idpctl render --image`
  port: 8080

routes:
  - host: kubagachi
    public: true

sizing:
  profile: minimal
  replicas: 1

# Live-cluster access comes from the pod's own ServiceAccount (cluster-read
# RBAC granted out-of-band: ClusterRole kubagachi-cluster-read). The entrypoint
# synthesizes a kubeconfig from the mounted SA token — no secret needed. To
# point at a DIFFERENT cluster instead, add a KUBECONFIG_DATA secret here.

# TCP probe: the web server is up as soon as it binds; port-open is the honest
# readiness signal regardless of cluster connectivity.
probes:
  type: tcp

build:
  dockerfile: Dockerfile
