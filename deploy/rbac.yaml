# kubagachi — cluster RBAC (applied out-of-band)
#
# The idp deploy.yaml contract does not model arbitrary cluster RBAC, so this
# lives here, version-controlled, and is applied directly. It grants the dev
# pod's ServiceAccount (kubagachi-dev-app/default) what the live-cluster cockpit
# needs:
#   • cluster-wide read (informers stream every resource kind), and
#   • create on pods/exec + pods/attach — the in-pod terminal shell
#     (web.go ExecArgs → `kubectl exec -it`).
#
# Apply / re-apply:
#   kubectl apply -f deploy/rbac.yaml
#
# NOTE: cluster-wide read + exec is broad — appropriate for a dev cockpit on a
# homelab cluster, NOT a template for prod. A prod deploy should scope this down
# (namespaces, resources) and bind a dedicated ServiceAccount.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubagachi-cluster-read
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # The interactive pod shell POSTs to pods/exec (and pods/attach).
  - apiGroups: [""]
    resources: ["pods/exec", "pods/attach"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubagachi-cluster-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubagachi-cluster-read
subjects:
  - kind: ServiceAccount
    name: default
    namespace: kubagachi-dev-app
